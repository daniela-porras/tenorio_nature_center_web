<section class="detail-header">

    <div class="container">

        <h1>{{guia.nombre}}</h1>

        <p>
            Guía turístico certificado de Tenorio Nature Center.
        </p>

    </div>

</section>

<div class="container py-5">

    <div class="detail-card">

        <div class="row g-4">

            <div class="col-md-6">

                <div class="info-item">
                    <i class="bi bi-person-badge-fill"></i>
                    <span>{{guia.identificador}}</span>
                </div>

                <div class="info-item">
                    <i class="bi bi-telephone-fill"></i>
                    <span>{{guia.telefono}}</span>
                </div>

                <div class="info-item">
                    <i class="bi bi-envelope-fill"></i>
                    <span>{{guia.email}}</span>
                </div>

            </div>

            <div class="col-md-6">

                <div class="info-item">
                    <i class="bi bi-flag-fill"></i>
                    <span>{{guia.nacionalidad}}</span>
                </div>

            </div>

            <hr>
            <h4 class="mt-3">Idiomas</h4>
            <div class="d-flex flex-wrap gap-2">
                @for(idioma of idiomas; track $index){
                    <span class="badge bg-success">
                        {{idioma.idiomanombre}}
                    </span>
    }

</div>
        <div class="text-center mt-4">

            <button
                class="btn btn-success rounded-pill px-4"
                [routerLink]="['/']"
            >
                Volver
            </button>

        </div>

    </div>

</div>
