<section class="admin-header">

    <div class="container">

        <h1>Administración de Idiomas</h1>

    </div>

</section>

<div class="container py-5">

     @if(mensaje){

    <div class="alert alert-success shadow-sm mb-4">

        {{mensaje}}

    </div>

    }

    <div class="card shadow p-4 mb-5">

        <h3>

            @if(editando){

                Editar Idioma

            }@else{

                Nuevo Idioma

            }

        </h3>

        <div class="row g-3">

            <div class="col-md-6">
                <input
                    class="form-control"
                    name="nombre"
                    placeholder="Nombre"
                    [(ngModel)]="idioma.nombre">
            </div>
            <div class="col-12">

                <button
                    class="btn btn-success me-2"
                    (click)="guardarIdioma()">

                    Guardar

                </button>

                @if(editando){

                    <button
                        class="btn btn-secondary"
                        (click)="cancelar()">

                        Cancelar

                    </button>

                }

            </div>

        </div>

    </div>

    <table class="table table-hover table-striped">

        <thead>

            <tr>

                <th>ID</th>
                <th>Nombre</th>
                <th></th>

            </tr>

        </thead>

        <tbody>

            @for(item of idiomas; track $index){

                <tr>

                    <td>{{item.ididioma}}</td>

                    <td>{{item.nombre}}</td>

                    <td>

                        <button
                            class="btn btn-edit btn-sm me-2"
                            (click)="editarIdioma(item)">

                            Editar

                        </button>

                        <button
                            class="btn btn-delete btn-sm"
                            (click)="seleccionarIdiomaEliminar(item.ididioma)"
                            data-bs-toggle="modal"
                            data-bs-target="#modalEliminarIdioma">

                            Eliminar

                        </button>

                    </td>

                </tr>

            }

        </tbody>

    </table>

    <div class="mb-4">

    <a
        class="btn btn-back"
        [routerLink]="['/admin']"
    >
        Regresar al panel
    </a>

</div>

<div
    class="modal fade"
    id="modalEliminarIdioma"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Confirmar eliminación

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                ¿Desea eliminar este idioma?

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button
                    type="button"
                    class="btn btn-danger"
                    data-bs-dismiss="modal"
                    (click)="confirmarEliminarIdioma()">

                    Eliminar

                </button>

            </div>

        </div>

    </div>

</div>

</div>
